# Example background-pipeline config
#
# This file is a tracked public template.
# Copy it to a local, gitignored file (for example:
# _local/setup/background_pipeline.local.yaml) and replace the placeholder
# values with your own machine-specific settings.
#
# Example defaults shown below match the paper-facing central prospective case:
#   model: image
#   pathway: SSP2-M
#   year: 2050
#   foresight_mode: perf
#
# Change these values as needed for your own local workflow.

project:
  name: YOUR_BRIGHTWAY_PROJECT_NAME
  brightway2_dir: PATH_TO_BRIGHTWAY_DATA_ROOT

source:
  kind: ecospold
  ecospold_datasets: PATH_TO_ECOINVENT_ECOSPOLD_DATASETS
  source_db: ecoinvent-3.10.1-consequential
  source_version: "3.10.1"
  system_model: consequential
  biosphere_name: ecoinvent-3.10-biosphere

scenario:
  model: image
  pathway: SSP2-M
  year: 2050
  foresight_mode: perf
  iam_output_dir: PATH_TO_LOCAL_IAM_OUTPUTS
  iam_key_env_var: PREMISE_KEY

premise:
  sectors_to_update: [electricity, fuels]
  use_cached_database: true
  use_cached_inventories: true
  use_multiprocessing: false
  use_absolute_efficiency: false
  quiet: false
  overwrite_existing: false
  delete_vacuum_on_overwrite: false
  stop_on_error: true
  min_activity_count_ok: 15000
  strict_require_system_args: true

uncertainty:
  keep_all_uncertainty: true
  keep_source_db_uncertainty: true
  keep_imports_uncertainty: true
  strict_require_uncertainty_support: false

outputs:
  run_log_dir: PATH_TO_LOCAL_LOG_DIR
  manifests_dir: PATH_TO_LOCAL_MANIFEST_DIR
  target_db_name: null
  audit_output_dir: PATH_TO_LOCAL_AUDIT_DIR

relink:
  roi_label: CAN
  roi_matches: [CAN, CA, Canada]
  na_matches: [NA, RNA, North America]
  dry_run: true
  source_db_name: prospective_conseq_IMAGE_SSP2M_2050_PERF
  work_db_name: prospective_conseq_IMAGE_SSP2M_2050_PERF_work
